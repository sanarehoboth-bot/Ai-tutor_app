<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Dashboard — TutorBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root { --primary:#6C63FF; --bg:#F4F3FF; }
body { font-family:'Nunito',sans-serif; background:var(--bg); padding:20px; margin:0; }
.card { background:#fff; border-radius:20px; padding:25px; margin-bottom:20px; box-shadow:0 4px 15px rgba(108,99,255,0.1); border:1px solid #E8E6FF; }
.reg-card { background:linear-gradient(135deg, #6C63FF, #A78BFA); color:#fff; }
.btn-reg { background:#fff; color:#6C63FF; padding:12px 24px; border-radius:30px; text-decoration:none; display:inline-block; font-weight:900; margin-top:15px; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
.stat-box { background:#fff; padding:20px; border-radius:15px; border-bottom:4px solid #6C63FF; }
.stat-val { font-size:28px; font-weight:900; display:block; }
.stat-label { font-size:12px; color:#8585A4; }
</style>
</head>
<body>
<div class="card reg-card">
  <h3 style="margin:0;">📋 Register a New Student</h3>
  <a href="https://forms.google.com" class="btn-reg">Register New Student →</a>
</div>
<div class="stat-grid">
  <div class="stat-box"><span class="stat-val">3</span><span class="stat-label">Total Students</span></div>
  <div class="stat-box" style="border-color:#FF6B6B;"><span class="stat-val">1</span><span class="stat-label">Fees Pending</span></div>
</div>
</body>
</html>
