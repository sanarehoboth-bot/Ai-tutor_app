<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorBuddy Pro Hub — Universal Learning Management Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --primary:#6C63FF; --bg:#0A0A2E; --card:rgba(255,255,255,0.08); }
body { font-family:'Nunito Sans',sans-serif; background:var(--bg); color:#fff; margin:0; overflow-x:hidden; }
.hero { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px; background:radial-gradient(circle at center, #1a1060 0%, #0A0A2E 100%); }
.container { max-width:800px; }
.badge { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#A78BFA; padding:8px 16px; border-radius:30px; font-size:12px; font-weight:800; text-transform:uppercase; margin-bottom:20px; display:inline-block; }
h1 { font-family:'Nunito',sans-serif; font-size:clamp(32px, 8vw, 54px); font-weight:900; line-height:1.1; margin-bottom:20px; }
.grad { background:linear-gradient(135deg,#A78BFA,#4ECDC4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
p { color:rgba(255,255,255,0.7); font-size:18px; margin-bottom:40px; line-height:1.6; }
.btn { display:inline-block; padding:16px 32px; border-radius:50px; font-weight:800; text-decoration:none; transition:0.3s; margin:10px; }
.btn-white { background:#fff; color:var(--primary); box-shadow:0 10px 20px rgba(0,0,0,0.2); }
.btn-outline { border:2px solid rgba(255,255,255,0.3); color:#fff; }
.stats { display:flex; justify-content:center; gap:40px; margin-top:60px; border-top:1px solid rgba(255,255,255,0.1); padding-top:40px; }
.stat-num { font-size:24px; font-weight:900; display:block; }
.stat-label { font-size:12px; color:rgba(255,255,255,0.5); font-weight:700; text-transform:uppercase; }
</style>
</head>
<body>
<section class="hero">
  <div class="container">
    <div class="badge">🚀 Platform V2.0 — Now Live</div>
    <h1>The Universal <span class="grad">Learning Management</span> Platform.</h1>
    <p>Track every student, manage attendance, monitor payments, and save resource links — all from one colourful hub.</p>
    <div class="actions">
      <a href="https://forms.google.com" class="btn btn-white">📋 Register New Student</a>
      <a href="full-access.html" class="btn btn-outline">View Dashboard →</a>
    </div>
    <div class="stats">
      <div><span class="stat-num">2,400+</span><span class="stat-label">Students</span></div>
      <div><span class="stat-num">98%</span><span class="stat-label">Satisfaction</span></div>
      <div><span class="stat-num">150+</span><span class="stat-label">Educators</span></div>
    </div>
  </div>
</section>
</body>
</html>
