<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorBuddy | Student Record Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .student-card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
    </style>
</head>
<body class="pb-10">

    <nav class="bg-[#4f46e5] text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">⭐</span>
                <div>
                    <h1 class="text-xl font-bold leading-none">TutorBuddy</h1>
                    <p class="text-xs opacity-80">Student Record Tracker</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg text-sm flex items-center gap-2">
                    <i class="fas fa-file-import"></i> <span class="hidden sm:inline">Import</span>
                </button>
                <button class="bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg text-sm flex items-center gap-2">
                    <i class="fas fa-file-export"></i> <span class="hidden sm:inline">Export</span>
                </button>
                <button class="bg-yellow-400 text-indigo-900 font-bold px-4 py-1.5 rounded-lg text-sm flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add Student
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 sm:p-6">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6 rounded-2xl border-l-8 border-indigo-500 shadow-sm">
                <p class="text-gray-500 text-sm font-bold uppercase tracking-wider">Total Students</p>
                <h2 class="text-4xl font-bold text-gray-800">20</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-8 border-emerald-500 shadow-sm">
                <p class="text-gray-500 text-sm font-bold uppercase tracking-wider">Present Today</p>
                <h2 class="text-4xl font-bold text-gray-800">0</h2>
                <p class="text-xs text-emerald-600 mt-1">0 absent today</p>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-8 border-rose-500 shadow-sm">
                <p class="text-gray-500 text-sm font-bold uppercase tracking-wider">Fees Collected</p>
                <h2 class="text-4xl font-bold text-gray-800">₹0</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl border-l-8 border-amber-500 shadow-sm">
                <p class="text-gray-500 text-sm font-bold uppercase tracking-wider">Fees Pending</p>
                <h2 class="text-4xl font-bold text-gray-800">₹0</h2>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
            <div class="flex bg-gray-200 p-1 rounded-xl w-full md:w-auto">
                <button class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold flex items-center gap-2">
                    <i class="fas fa-users"></i> Students
                </button>
                <button class="px-6 py-2 text-gray-600 hover:text-indigo-600 font-semibold flex items-center gap-2">
                    <i class="fas fa-calendar-check"></i> Attendance
                </button>
                <button class="px-6 py-2 text-gray-600 hover:text-indigo-600 font-semibold flex items-center gap-2">
                    <i class="fas fa-edit"></i> Marks
                </button>
                <button class="px-6 py-2 text-gray-600 hover:text-indigo-600 font-semibold flex items-center gap-2">
                    <i class="fas fa-money-bill-wave"></i> Fees
                </button>
            </div>
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" placeholder="Search students..." class="w-full pl-12 pr-4 py-3 rounded-full border-2 border-gray-100 focus:border-indigo-500 outline-none transition-all">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="glass-card p-5 rounded-2xl student-card shadow-md border-t-4 border-indigo-400">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-indigo-100 text-indigo-600 flex items-center justify-center text-2xl font-bold">SF</div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 uppercase">Shanaya Fernandez</h3>
                            <p class="text-sm text-gray-500">Age 13 • 8th Grade</p>
                            <span class="inline-block mt-1 px-3 py-0.5 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">English</span>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl mb-4">
                    <div class="flex justify-between text-xs font-bold mb-1">
                        <span class="text-gray-500 uppercase">Attendance 100%</span>
                        <span class="text-indigo-600">1P • 0A • 0L</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                        <div class="bg-indigo-500 h-full w-full"></div>
                    </div>
                </div>
                <div class="flex gap-2 text-xs mb-4">
                    <span class="font-bold text-gray-600">💰 ₹10,000/month</span>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <button class="bg-emerald-100 text-emerald-700 p-2 rounded-lg font-bold flex items-center justify-center gap-1 hover:bg-emerald-200"><i class="fas fa-file-alt"></i> View</button>
                    <button class="bg-amber-100 text-amber-700 p-2 rounded-lg font-bold flex items-center justify-center gap-1 hover:bg-amber-200"><i class="fas fa-pen"></i> Edit</button>
                    <button class="bg-indigo-100 text-indigo-700 p-2 rounded-lg font-bold flex items-center justify-center gap-1 hover:bg-indigo-200 col-span-1"><i class="fab fa-whatsapp"></i></button>
                    <button class="bg-rose-100 text-rose-700 p-2 rounded-lg font-bold flex items-center justify-center hover:bg-rose-200"><i class="fas fa-trash"></i></button>
                </div>
            </div>

            <div class="glass-card p-5 rounded-2xl student-card shadow-md border-t-4 border-rose-400">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-rose-100 text-rose-600 flex items-center justify-center text-2xl font-bold">AH</div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 uppercase">Abhinav H</h3>
                            <p class="text-sm text-gray-500">Age 5 • 1st Grade</p>
                            <span class="inline-block mt-1 px-3 py-0.5 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">Math</span>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl mb-4 text-center py-6 border-2 border-dashed border-gray-200">
                    <p class="text-xs text-gray-400 font-bold uppercase">No Attendance Marked Today</p>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <button class="bg-emerald-100 text-emerald-700 p-2 rounded-lg font-bold flex items-center justify-center gap-1 hover:bg-emerald-200"><i class="fas fa-file-alt"></i> View</button>
                    <button class="bg-amber-100 text-amber-700 p-2 rounded-lg font-bold flex items-center justify-center gap-1 hover:bg-amber-200"><i class="fas fa-pen"></i> Edit</button>
                    <button class="bg-indigo-100 text-indigo-700 p-2 rounded-lg font-bold flex items-center justify-center gap-1 hover:bg-indigo-200"><i class="fab fa-whatsapp"></i></button>
                    <button class="bg-rose-100 text-rose-700 p-2 rounded-lg font-bold flex items-center justify-center hover:bg-rose-200"><i class="fas fa-trash"></i></button>
                </div>
            </div>

            </div>
    </main>

    <button class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl hover:scale-110 transition-all">
        <i class="fas fa-robot"></i>
    </button>

</body>
</html>
